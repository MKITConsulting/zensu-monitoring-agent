{{- if .Values.rbac.create }}
# Least privilege: read-only access to Deployments, Pods, and pod metrics. The
# agent never creates, updates, patches, or deletes anything.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zensu-agent.fullname" . }}
  labels:
    {{- include "zensu-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read per-pod CPU/memory from metrics-server. Absent on clusters without
  # metrics-server; the agent degrades gracefully (heartbeat without metrics).
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zensu-agent.fullname" . }}
  labels:
    {{- include "zensu-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zensu-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zensu-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
