{{- if eq .Values.agent.mode "deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zensu-monitoring-agent.fullname" . }}
  labels:
    {{- include "zensu-monitoring-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zensu-monitoring-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if and .Values.metrics.enabled .Values.metrics.podAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: /metrics
      {{- end }}
      labels:
        {{- include "zensu-monitoring-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zensu-monitoring-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "zensu-monitoring-agent.fullname" . }}
            - secretRef:
                name: {{ include "zensu-monitoring-agent.secretName" . }}
          {{- if .Values.metrics.enabled }}
          env:
            - name: ZENSU_MONITORING_AGENT_METRICS_ENABLED
              value: "true"
            - name: ZENSU_MONITORING_AGENT_METRICS_ADDR
              value: ":{{ .Values.metrics.port }}"
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 30
          {{- else }}
          env:
            - name: ZENSU_MONITORING_AGENT_METRICS_ENABLED
              value: "false"
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
