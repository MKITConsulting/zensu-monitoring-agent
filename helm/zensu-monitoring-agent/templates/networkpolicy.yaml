{{- if and (eq .Values.agent.mode "deployment") .Values.metrics.enabled .Values.metrics.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zensu-monitoring-agent.fullname" . }}-metrics
  labels:
    {{- include "zensu-monitoring-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "zensu-monitoring-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
      {{- with .Values.metrics.networkPolicy.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
